<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>DaysPop</title>
  <meta name="description" content="Beautiful countdown timers for everything you love">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DaysPop">
  <meta name="theme-color" content="#FDF0FF">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="app.css?v=1.0.4">
</head>
<body>
  
  <div id="back-bar" style="
    display:flex; align-items:center; justify-content:space-between;
    padding: 8px 16px 4px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    color: #888;
    background: #FDF0FF;
  ">
    <a href="https://dayspop.com" style="color:#C85FD4; font-weight:700; text-decoration:none; display:flex; align-items:center; gap:4px;">
      ← dayspop.com
    </a>
    <span style="font-size:0.72rem; opacity:0.6;">v1.0.4 · Add to Home Screen</span>
  </div>
  <script>
    // Hide the back bar when running as installed PWA (standalone mode)
    if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
      document.getElementById('back-bar').style.display = 'none';
    }
  </script>

  <canvas id="sparkles"></canvas>

  <div id="app">
    <section class="screen active" id="screen-home"></section>
    <section class="screen" id="screen-add"></section>
    <section class="screen detail-screen" id="screen-detail"></section>
    <section class="screen" id="screen-settings"></section>
  </div>

  <button class="fab" id="fab" onclick="handleAddTap()" aria-label="Add countdown">+</button>

  <div class="paywall-overlay" id="paywall"></div>
  <div id="confirm-root"></div>
  <div id="pro-success-root"></div>
  <div class="toast" id="toast"></div>

  <script src="app.js?v=1.0.4"></script>
</body>
</html>
